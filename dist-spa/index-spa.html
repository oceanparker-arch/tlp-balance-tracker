<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLP Client Account Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <script type="module" crossorigin src="/assets/index-spa-BeYzHKd4.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/styles-kUOavRCP.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
(function () {
  'use strict';

  var HIGH_REASONS = [
    'Large landlord joining',
    'Acquisition',
    'High volume of move ins / deposits',
    'Large float in account',
    'Other'
  ];
  var LOW_REASONS = [
    'Large landlord leaving',
    'Large float being returned',
    'Large suspense items',
    'Potential fraud',
    'Other'
  ];

  var menuEl = null;

  function removeMenu() {
    if (menuEl && menuEl.parentNode) {
      menuEl.parentNode.removeChild(menuEl);
    }
    menuEl = null;
  }

  function saveEntry(agentId, platformId, agentName, platformName, balance, isHigh, reason, notes, action) {
    var today = new Date().toISOString().slice(0, 10);
    var id = 'jo-' + today + '-' + platformId + '-' + agentId + '-band';
    var entry = {
      id: id, date: today,
      agentId: agentId, agentName: agentName,
      platformId: platformId, platformName: platformName,
      alertType: isHigh ? 'above_band' : 'below_band',
      balance: parseFloat(balance.replace(/[£,]/g, '')) || 0,
      variancePct: 0,
      reason: reason, notes: notes,
      action: action,
      passedToCarl: action === 'escalate_carl',
      passedToCarlAt: action === 'escalate_carl' ? new Date().toISOString() : undefined
    };
    var existing = [];
    try { existing = JSON.parse(localStorage.getItem('tlp_jo_entries') || '[]'); } catch(e) {}
    existing = existing.filter(function(e) { return e.id !== id; });
    existing.unshift(entry);
    localStorage.setItem('tlp_jo_entries', JSON.stringify(existing));

    if (action === 'escalate_carl') {
      var deadline = new Date();
      deadline.setDate(deadline.getDate() + 7);
      var carlEntry = {
        id: 'carl-' + Date.now() + '-' + Math.random().toString(36).slice(2,7),
        joEntryId: id,
        date: today,
        agentId: agentId, agentName: agentName,
        platformId: platformId, platformName: platformName,
        alertType: isHigh ? 'above_band' : 'below_band',
        balance: entry.balance, variancePct: 0,
        joReason: reason, joNotes: notes,
        reason: '', notes: '', action: '',
        passedToCarlAt: new Date().toISOString(),
        deadline: deadline.toISOString().slice(0, 10),
        status: 'open'
      };
      var carlExisting = [];
      try { carlExisting = JSON.parse(localStorage.getItem('tlp_carl_entries') || '[]'); } catch(e) {}
      carlExisting.unshift(carlEntry);
      localStorage.setItem('tlp_carl_entries', JSON.stringify(carlExisting));
    }
  }

  function showMenu(x, y, rowEl) {
    removeMenu();

    var agentLink = rowEl.querySelector('a[href*="/agent/"]');
    var agentName = agentLink ? agentLink.textContent.trim() : '(unknown)';
    var platformBadge = rowEl.querySelector('td:nth-child(2)');
    var platformName = platformBadge ? platformBadge.textContent.trim() : '';
    var balanceCell = rowEl.querySelector('td:nth-child(3)');
    var balance = balanceCell ? balanceCell.textContent.trim() : '';
    var breakoutCell = rowEl.querySelector('td:nth-child(4)');
    var breakoutText = breakoutCell ? breakoutCell.textContent.trim() : '';
    var isHigh = breakoutText.indexOf('Above') >= 0 || breakoutText.indexOf('above') >= 0 || breakoutText.indexOf('↑') >= 0;

    // Extract platformId and agentId from link href /agent/platformId/agentId
    var agentId = '', platformId = '';
    if (agentLink) {
      var parts = agentLink.getAttribute('href').split('/');
      platformId = parts[2] || '';
      agentId = parts[3] || '';
    }

    var reasons = isHigh ? HIGH_REASONS : LOW_REASONS;

    var menu = document.createElement('div');
    menu.style.cssText = [
      'position:fixed',
      'z-index:99999',
      'background:#fff',
      'border:1px solid #e5e7eb',
      'border-radius:8px',
      'box-shadow:0 8px 24px rgba(0,0,0,0.18)',
      'width:300px',
      'font-family:system-ui,sans-serif',
      'font-size:13px',
      'overflow:hidden'
    ].join(';');

    var left = Math.min(x, window.innerWidth  - 316);
    var top  = Math.min(y, window.innerHeight - 300);
    menu.style.left = left + 'px';
    menu.style.top  = top  + 'px';

    // Header
    var header = document.createElement('div');
    header.style.cssText = 'padding:10px 14px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:flex-start';
    var headerLeft = document.createElement('div');
    headerLeft.innerHTML =
      '<div style="font-weight:600;font-size:13px;color:#111">' + agentName + '</div>' +
      '<div style="font-size:11px;color:#666;margin-top:2px">' + platformName + ' &middot; ' + balance + '</div>';
    var closeX = document.createElement('button');
    closeX.textContent = '×';
    closeX.style.cssText = 'background:none;border:none;font-size:18px;cursor:pointer;color:#999;line-height:1;padding:0;margin-top:-2px';
    closeX.onclick = removeMenu;
    header.appendChild(headerLeft);
    header.appendChild(closeX);
    menu.appendChild(header);

    // Body
    var body = document.createElement('div');
    body.style.cssText = 'padding:12px 14px';

    // Reason label
    var reasonLabel = document.createElement('label');
    reasonLabel.textContent = 'Reason';
    reasonLabel.style.cssText = 'display:block;font-size:11px;font-weight:500;color:#555;margin-bottom:4px';
    body.appendChild(reasonLabel);

    // Reason select
    var select = document.createElement('select');
    select.style.cssText = 'width:100%;border:1px solid #d1d5db;border-radius:6px;padding:6px 8px;font-size:12px;background:#fff;color:#111;margin-bottom:10px';
    var defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = 'Select reason…';
    select.appendChild(defaultOpt);
    reasons.forEach(function(r) {
      var opt = document.createElement('option');
      opt.value = r;
      opt.textContent = r;
      select.appendChild(opt);
    });
    body.appendChild(select);

    // Notes area (hidden until needed)
    var notesWrap = document.createElement('div');
    notesWrap.style.display = 'none';
    notesWrap.style.marginBottom = '10px';
    var notesLabel = document.createElement('label');
    notesLabel.textContent = 'Notes';
    notesLabel.style.cssText = 'display:block;font-size:11px;font-weight:500;color:#555;margin-bottom:4px';
    var notesArea = document.createElement('textarea');
    notesArea.rows = 2;
    notesArea.placeholder = 'Add notes…';
    notesArea.style.cssText = 'width:100%;border:1px solid #d1d5db;border-radius:6px;padding:6px 8px;font-size:12px;background:#fff;color:#111;resize:none;box-sizing:border-box';
    notesWrap.appendChild(notesLabel);
    notesWrap.appendChild(notesArea);
    body.appendChild(notesWrap);

    select.onchange = function() {
      var needs = select.value === 'Other' || select.value === 'Potential fraud';
      notesWrap.style.display = needs ? 'block' : 'none';
      // resize menu position if it would go off screen
      menu.style.top = Math.min(parseInt(menu.style.top), window.innerHeight - menu.offsetHeight - 8) + 'px';
    };

    // Buttons
    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;border-top:1px solid #f3f4f6;padding-top:10px';

    var noActionBtn = document.createElement('button');
    noActionBtn.textContent = 'No action required';
    noActionBtn.style.cssText = 'font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#111';
    noActionBtn.onclick = function() {
      if (!select.value) { select.style.borderColor = '#ef4444'; return; }
      saveEntry(agentId, platformId, agentName, platformName, balance, isHigh, select.value, notesArea.value, 'no_action');
      removeMenu();
      // Update the row to show done status
      var lastCell = rowEl.querySelector('td:last-child');
      if (lastCell) lastCell.innerHTML = '<span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;background:rgba(39,174,96,0.12);color:#1E8449">No action</span>';
      rowEl.style.borderLeft = '3px solid #27AE60';
    };

    var escalateBtn = document.createElement('button');
    escalateBtn.textContent = 'Escalate to Carl';
    escalateBtn.style.cssText = 'font-size:12px;padding:6px 10px;border-radius:6px;border:none;background:#1B2E4B;color:#fff;cursor:pointer';
    escalateBtn.onclick = function() {
      if (!select.value) { select.style.borderColor = '#ef4444'; return; }
      var needsNotes = select.value === 'Other' || select.value === 'Potential fraud';
      if (needsNotes && !notesArea.value.trim()) { notesArea.style.borderColor = '#ef4444'; return; }
      saveEntry(agentId, platformId, agentName, platformName, balance, isHigh, select.value, notesArea.value, 'escalate_carl');
      removeMenu();
      var lastCell = rowEl.querySelector('td:last-child');
      if (lastCell) lastCell.innerHTML = '<span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;background:rgba(46,125,138,0.12);color:#2E7D8A">→ Carl</span>';
      rowEl.style.borderLeft = '3px solid #2E7D8A';
    };

    btnRow.appendChild(noActionBtn);
    btnRow.appendChild(escalateBtn);
    body.appendChild(btnRow);
    menu.appendChild(body);
    // Prevent mousedown inside the menu from triggering the dismiss listener
    menu.addEventListener('mousedown', function(e) { e.stopPropagation(); }, true);
    document.body.appendChild(menu);
    menuEl = menu;
  }

  function init() {
    document.addEventListener('contextmenu', function (e) {
      var row = e.target.closest('tr[style*="context-menu"]');
      if (!row) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      showMenu(e.clientX, e.clientY, row);
    }, true);

    document.addEventListener('mousedown', function (e) {
      if (!menuEl) return;
      if (menuEl.contains(e.target)) return;
      removeMenu();
    }, true);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') removeMenu();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
    </script>
  </body>
</html>
